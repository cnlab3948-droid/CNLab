<!--
  =====================================================
  CNLab 홈페이지 - 공지사항 섹션 (notice_section.html)
  =====================================================

  [통합 방법]
  이 파일은 독립 섹션입니다. 기존 index.html에 붙여넣을 때:

  1. <head> 안에 아래 구글 폰트 링크 추가:
     <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  2. <style> 블록 → 기존 CSS 파일(css/ 폴더)에 통합하거나
     index.html <head> 안에 그대로 붙여넣기

  3. 본문 HTML 블록 → index.html의 공지사항 섹션 위치에 붙여넣기

  4. <script> 블록 → 기존 JS 파일(js/ 폴더)에 통합하거나
     </body> 바로 위에 붙여넣기

  5. APPS_SCRIPT_URL 변수에 Apps Script 배포 URL 입력
     (apps_script.js 파일을 Google Apps Script에 배포 후 발급된 URL)

  [구글 시트 헤더 형식 - 공지사항 탭]
  id | category_ko | title_ko | summary_ko | content_ko | category_en | title_en | ...
  =====================================================
-->

<!-- ===================== STYLE ===================== -->
<style>
  /* --- 공지사항 섹션 변수 --- */
  :root {
    --notice-blue: #3b5bdb;
    --notice-blue-light: #e8ecfd;
    --notice-navy: #1a2340;
    --notice-gray: #6b7280;
    --notice-border: #e5e7eb;
    --notice-bg: #f9fafb;
  }

  /* --- 섹션 헤더 --- */
  .notice-section-tag {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--notice-gray);
    background: var(--notice-bg);
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .notice-section-header {
    text-align: center;
    margin-bottom: 10px;
  }
  .notice-section-header h2 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--notice-navy);
  }
  .notice-section-desc {
    text-align: center;
    color: var(--notice-gray);
    font-size: 0.9rem;
    margin-bottom: 36px;
  }

  /* --- 탭 필터 --- */
  .notice-tab-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .notice-tab-btn {
    padding: 7px 18px;
    border-radius: 999px;
    border: 1.5px solid var(--notice-border);
    background: #fff;
    color: var(--notice-gray);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .notice-tab-btn:hover {
    border-color: var(--notice-blue);
    color: var(--notice-blue);
  }
  .notice-tab-btn.active {
    background: var(--notice-blue);
    border-color: var(--notice-blue);
    color: #fff;
  }

  /* --- 공지 리스트 --- */
  .notice-list { display: flex; flex-direction: column; gap: 0; }

  /* 고정 공지 */
  .notice-item.pinned {
    border-left: 4px solid var(--notice-blue);
    background: linear-gradient(to right, #eef1fd, #f5f7ff);
    border-radius: 10px;
    margin-bottom: 10px;
    padding: 18px 22px;
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .notice-item.pinned:hover {
    box-shadow: 0 4px 16px rgba(59,91,219,0.12);
  }

  /* 일반 공지 */
  .notice-item.normal {
    border-bottom: 1px solid var(--notice-border);
    padding: 18px 4px;
    display: flex;
    align-items: center;
    gap: 20px;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.12s, padding-left 0.12s;
  }
  .notice-item.normal:hover {
    background: var(--notice-bg);
    padding-left: 10px;
  }

  .notice-item-date {
    font-size: 0.78rem;
    color: var(--notice-gray);
    min-width: 74px;
    flex-shrink: 0;
  }
  .notice-cat-badge {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--notice-blue);
    background: var(--notice-blue-light);
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .notice-item-body { flex: 1; min-width: 0; }
  .notice-item-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--notice-navy);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .notice-item-summary {
    font-size: 0.82rem;
    color: var(--notice-gray);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .notice-item-arrow {
    color: #cbd5e1;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .notice-item.normal:hover .notice-item-arrow { color: var(--notice-blue); }

  /* 고정 공지 상단 뱃지 */
  .notice-pinned-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .notice-pin-icon { font-size: 0.75rem; color: var(--notice-blue); }
  .notice-pin-cat { font-size: 0.72rem; font-weight: 700; color: var(--notice-blue); }

  /* 빈 상태 */
  .notice-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--notice-gray);
    font-size: 0.9rem;
  }

  /* 로딩 스피너 */
  .notice-spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--notice-border);
    border-top-color: var(--notice-blue);
    border-radius: 50%;
    animation: notice-spin 0.8s linear infinite;
    margin: 60px auto 12px;
  }
  @keyframes notice-spin { to { transform: rotate(360deg); } }
  .notice-loading-txt {
    text-align: center;
    color: var(--notice-gray);
    font-size: 0.88rem;
  }

  /* --- 모달 --- */
  .notice-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.45);
    backdrop-filter: blur(3px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .notice-modal-overlay.open { display: flex; }

  .notice-modal-box {
    background: #fff;
    border-radius: 16px;
    max-width: 540px;
    width: 100%;
    max-height: 78vh;
    overflow-y: auto;
    padding: 36px 36px 32px;
    position: relative;
    animation: notice-fadeUp 0.22s ease;
  }
  @keyframes notice-fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .notice-modal-close {
    position: absolute; top: 14px; right: 18px;
    background: none; border: none;
    font-size: 1.3rem; cursor: pointer;
    color: var(--notice-gray);
  }
  .notice-modal-close:hover { color: var(--notice-navy); }
  .notice-modal-meta {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .notice-modal-date { font-size: 0.78rem; color: var(--notice-gray); }
  .notice-modal-title {
    font-size: 1.25rem; font-weight: 700;
    line-height: 1.45; margin-bottom: 20px;
  }
  .notice-modal-content {
    font-size: 0.91rem; line-height: 1.9;
    color: #374151;
    white-space: pre-line;
    border-top: 1px solid var(--notice-border);
    padding-top: 18px;
  }
</style>

<!-- ===================== HTML ===================== -->
<section id="notice" style="max-width:860px; margin:0 auto; padding:60px 24px 80px;">

  <div style="text-align:center; margin-bottom:4px;">
    <span class="notice-section-tag">NOTICE</span>
  </div>
  <div class="notice-section-header"><h2>공지사항</h2></div>
  <p class="notice-section-desc">연구 참여 모집, 세미나 안내 등 CNLab의 소식을 확인하세요.</p>

  <!-- 탭 필터 -->
  <div class="notice-tab-bar" id="notice-tab-bar">
    <button class="notice-tab-btn active" data-cat="전체" onclick="noticeFilterTab(this)">전체</button>
    <button class="notice-tab-btn" data-cat="알림" onclick="noticeFilterTab(this)">알림</button>
    <button class="notice-tab-btn" data-cat="실험 안내" onclick="noticeFilterTab(this)">실험 안내</button>
    <button class="notice-tab-btn" data-cat="학회" onclick="noticeFilterTab(this)">학회</button>
    <button class="notice-tab-btn" data-cat="세미나" onclick="noticeFilterTab(this)">세미나</button>
    <button class="notice-tab-btn" data-cat="기타" onclick="noticeFilterTab(this)">기타</button>
  </div>

  <!-- 공지 목록 -->
  <div id="notice-container">
    <div class="notice-spinner"></div>
    <div class="notice-loading-txt">공지사항 불러오는 중...</div>
  </div>

</section>

<!-- 상세 모달 -->
<div class="notice-modal-overlay" id="notice-modal" onclick="noticeCloseModal(event)">
  <div class="notice-modal-box">
    <button class="notice-modal-close" onclick="noticeCloseModal()">✕</button>
    <div class="notice-modal-meta" id="notice-modal-meta"></div>
    <div class="notice-modal-title" id="notice-modal-title"></div>
    <div class="notice-modal-content" id="notice-modal-content"></div>
  </div>
</div>

<!-- ===================== SCRIPT ===================== -->
<script>
(function () {
  // ✅ Apps Script 배포 후 발급된 URL을 여기에 입력하세요
  const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

  let _noticeAllData = [];
  let _noticeCurCat = '전체';

  async function noticeLoad() {
    if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      _noticeAllData = _noticeDemoData();
      noticeRender();
      return;
    }
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?sheet=공지사항`);
      const raw = await res.json();
      _noticeAllData = raw
        .filter(r => r.title_ko || r.title)
        .map(r => ({
          id:       r.id || '',
          category: r.category_ko || r.category || '',
          title:    r.title_ko || r.title || '',
          summary:  r.summary_ko || r.summary || '',
          content:  r.content_ko || r.content || '',
          date:     r.date || '',
          pinned:   String(r.pinned || '').toLowerCase() === 'true',
        }));
      noticeRender();
    } catch (e) {
      document.getElementById('notice-container').innerHTML =
        '<div class="notice-empty">❌ 데이터를 불러오지 못했습니다.<br>Apps Script URL을 확인해 주세요.</div>';
    }
  }

  window.noticeFilterTab = function (btn) {
    document.querySelectorAll('.notice-tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _noticeCurCat = btn.dataset.cat;
    noticeRender();
  };

  function noticeRender() {
    const container = document.getElementById('notice-container');
    const filtered = _noticeCurCat === '전체'
      ? _noticeAllData
      : _noticeAllData.filter(d => d.category === _noticeCurCat);

    if (filtered.length === 0) {
      container.innerHTML = '<div class="notice-empty">해당 카테고리의 공지가 없습니다.</div>';
      return;
    }

    const pinned = filtered.filter(d => d.pinned);
    const normal = filtered.filter(d => !d.pinned);
    let html = '<div class="notice-list">';

    pinned.forEach(item => {
      html += `
        <div class="notice-item pinned" onclick='noticeOpenModal(${JSON.stringify(item)})'>
          <div class="notice-pinned-top">
            <span class="notice-pin-icon">📌</span>
            <span class="notice-pin-cat">${item.category}</span>
          </div>
          <div class="notice-item-title">${item.title}</div>
          <div class="notice-item-summary">${item.summary}</div>
          <div class="notice-item-date" style="margin-top:8px;">${item.date}</div>
        </div>`;
    });

    normal.forEach(item => {
      html += `
        <div class="notice-item normal" onclick='noticeOpenModal(${JSON.stringify(item)})'>
          <div class="notice-item-date">${item.date}</div>
          <span class="notice-cat-badge">${item.category}</span>
          <div class="notice-item-body">
            <div class="notice-item-title">${item.title}</div>
            <div class="notice-item-summary">${item.summary}</div>
          </div>
          <div class="notice-item-arrow">›</div>
        </div>`;
    });

    html += '</div>';
    container.innerHTML = html;
  }

  window.noticeOpenModal = function (item) {
    if (typeof item === 'string') item = JSON.parse(item);
    document.getElementById('notice-modal-meta').innerHTML = `
      <span class="notice-cat-badge">${item.category}</span>
      <span class="notice-modal-date">${item.date}</span>
    `;
    document.getElementById('notice-modal-title').textContent = item.title;
    document.getElementById('notice-modal-content').textContent = item.content || item.summary;
    document.getElementById('notice-modal').classList.add('open');
  };

  window.noticeCloseModal = function (e) {
    if (!e || e.target === document.getElementById('notice-modal') || e.currentTarget.tagName === 'BUTTON') {
      document.getElementById('notice-modal').classList.remove('open');
    }
  };

  function _noticeDemoData() {
    return [
      { id:1, category:'학회', title:'2026년도 심리언어학회', date:'2026.04.21',
        summary:'2026.05.15-16 심리언어학회 참여', pinned:true,
        content:'2026년 심리언어학회\n🗓️ 일정: 2026.05.15-2026.05.16\n📍 장소: 서강대학교 정하상관 118호' },
      { id:2, category:'실험 안내', title:'실험 피험자 모집 안내', date:'2026.05.10',
        summary:'사진 기반 문장 서술 과제 참여자 모집', pinned:false,
        content:'실험 피험자를 상시 모집합니다.\n소요 시간: 약 25분' },
      { id:3, category:'알림', title:'연구실 세미나 일정 변경', date:'2026.04.15',
        summary:'5월 세미나 일정이 변경되었습니다.', pinned:false,
        content:'5월 정기 세미나 일정이 변경되었습니다.\n🗓️ 변경일: 2026.05.22 (기존 05.15)' },
      { id:4, category:'세미나', title:'인지언어학 특강 안내', date:'2026.04.10',
        summary:'외부 초청 특강 안내입니다.', pinned:false,
        content:'인지언어학 관련 외부 초청 특강을 개최합니다.\n🗓️ 일정: 2026.04.28\n📍 장소: 심리학과 세미나실' },
    ];
  }

  noticeLoad();
})();
</script>
